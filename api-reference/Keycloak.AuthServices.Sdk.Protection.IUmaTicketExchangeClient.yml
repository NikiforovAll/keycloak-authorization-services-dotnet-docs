- uid: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  commentId: M:Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  id: SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  parent: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient
  langs:
  - csharp
  - vb
  name: SubmitPermissionRequestAsync(string, string, CancellationToken)
  nameWithType: IUmaTicketExchangeClient.SubmitPermissionRequestAsync(string, string, CancellationToken)
  fullName: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.SubmitPermissionRequestAsync(string, string, System.Threading.CancellationToken)
  type: Method
  assemblies:
  - Keycloak.AuthServices.Sdk
  namespace: Keycloak.AuthServices.Sdk.Protection
  summary: Submits a permission request for resource owner approval.
  remarks: >-
    Uses the <code>submit_request=true</code> parameter in the UMA ticket exchange.

    When access is denied, Keycloak persists a pending permission request that

    the resource owner can approve.
  example: []
  syntax:
    content: Task<bool> SubmitPermissionRequestAsync(string accessToken, string ticket, CancellationToken cancellationToken = default)
    parameters:
    - id: accessToken
      type: System.String
      description: The bearer access token of the requesting party.
    - id: ticket
      type: System.String
      description: The permission ticket received from the resource server's UMA challenge.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
      description: <code>true</code> if the permission request was submitted for owner approval; otherwise <code>false</code>.
    content.vb: Function SubmitPermissionRequestAsync(accessToken As String, ticket As String, cancellationToken As CancellationToken = Nothing) As Task(Of Boolean)
  overload: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.SubmitPermissionRequestAsync*
  nameWithType.vb: IUmaTicketExchangeClient.SubmitPermissionRequestAsync(String, String, CancellationToken)
  fullName.vb: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.SubmitPermissionRequestAsync(String, String, System.Threading.CancellationToken)
  name.vb: SubmitPermissionRequestAsync(String, String, CancellationToken)
