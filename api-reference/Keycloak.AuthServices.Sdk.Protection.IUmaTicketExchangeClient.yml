- uid: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient
  commentId: T:Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient
  id: IUmaTicketExchangeClient
  parent: Keycloak.AuthServices.Sdk.Protection
  children:
  - Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.ExchangeTicketForRptAsync(System.String,System.String,System.Threading.CancellationToken)
  - Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  langs:
  - csharp
  - vb
  name: IUmaTicketExchangeClient
  nameWithType: IUmaTicketExchangeClient
  fullName: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient
  type: Interface
  assemblies:
  - Keycloak.AuthServices.Sdk
  namespace: Keycloak.AuthServices.Sdk.Protection
  summary: Client for exchanging UMA permission tickets at the Keycloak token endpoint.
  remarks: >-
    Implements the UMA grant type (<code>urn:ietf:params:oauth:grant-type:uma-ticket</code>)

    to exchange permission tickets for RPTs (Requesting Party Tokens) or to submit

    permission requests for resource owner approval.
  example: []
  syntax:
    content: public interface IUmaTicketExchangeClient
    content.vb: Public Interface IUmaTicketExchangeClient
  derivedClasses:
  - Keycloak.AuthServices.Sdk.Protection.UmaTicketExchangeClient
- uid: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.ExchangeTicketForRptAsync(System.String,System.String,System.Threading.CancellationToken)
  commentId: M:Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.ExchangeTicketForRptAsync(System.String,System.String,System.Threading.CancellationToken)
  id: ExchangeTicketForRptAsync(System.String,System.String,System.Threading.CancellationToken)
  parent: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient
  langs:
  - csharp
  - vb
  name: ExchangeTicketForRptAsync(string, string, CancellationToken)
  nameWithType: IUmaTicketExchangeClient.ExchangeTicketForRptAsync(string, string, CancellationToken)
  fullName: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.ExchangeTicketForRptAsync(string, string, System.Threading.CancellationToken)
  type: Method
  assemblies:
  - Keycloak.AuthServices.Sdk
  namespace: Keycloak.AuthServices.Sdk.Protection
  summary: Exchanges a UMA permission ticket for a Requesting Party Token (RPT).
  example: []
  syntax:
    content: Task<string?> ExchangeTicketForRptAsync(string accessToken, string ticket, CancellationToken cancellationToken = default)
    parameters:
    - id: accessToken
      type: System.String
      description: The bearer access token of the requesting party.
    - id: ticket
      type: System.String
      description: The permission ticket received from the resource server's UMA challenge.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.String}
      description: The RPT access token string, or <code>null</code> if the exchange failed.
    content.vb: Function ExchangeTicketForRptAsync(accessToken As String, ticket As String, cancellationToken As CancellationToken = Nothing) As Task(Of String)
  overload: Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient.ExchangeTicketForRptAsync*
