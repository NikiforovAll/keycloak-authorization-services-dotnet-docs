- uid: Microsoft.Extensions.DependencyInjection.UmaServiceCollectionExtensions.AddUmaPermissionTicketChallenge(Microsoft.Extensions.DependencyInjection.IServiceCollection)
  commentId: M:Microsoft.Extensions.DependencyInjection.UmaServiceCollectionExtensions.AddUmaPermissionTicketChallenge(Microsoft.Extensions.DependencyInjection.IServiceCollection)
  id: AddUmaPermissionTicketChallenge(Microsoft.Extensions.DependencyInjection.IServiceCollection)
  isExtensionMethod: true
  parent: Microsoft.Extensions.DependencyInjection.UmaServiceCollectionExtensions
  langs:
  - csharp
  - vb
  name: AddUmaPermissionTicketChallenge(IServiceCollection)
  nameWithType: UmaServiceCollectionExtensions.AddUmaPermissionTicketChallenge(IServiceCollection)
  fullName: Microsoft.Extensions.DependencyInjection.UmaServiceCollectionExtensions.AddUmaPermissionTicketChallenge(Microsoft.Extensions.DependencyInjection.IServiceCollection)
  type: Method
  assemblies:
  - Keycloak.AuthServices.Authorization.Uma
  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Adds UMA permission ticket challenge support. When authorization fails for a

    protected resource requirement, the server returns HTTP 401 with a

    <code>WWW-Authenticate: UMA</code> header containing a permission ticket.
  remarks: >-
    Requires <code>AddAuthorizationServer</code> and <code>AddKeycloakProtectionHttpClient</code>

    to be called first. The protection client must be configured with client credentials

    to authenticate against the Keycloak Protection API.
  example: []
  syntax:
    content: public static IServiceCollection AddUmaPermissionTicketChallenge(this IServiceCollection services)
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection.
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection for chaining.
    content.vb: Public Shared Function AddUmaPermissionTicketChallenge(services As IServiceCollection) As IServiceCollection
  overload: Microsoft.Extensions.DependencyInjection.UmaServiceCollectionExtensions.AddUmaPermissionTicketChallenge*
