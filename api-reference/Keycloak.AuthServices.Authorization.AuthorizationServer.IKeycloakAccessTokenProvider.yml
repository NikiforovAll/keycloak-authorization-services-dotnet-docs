  type: Interface
  assemblies:
  - Keycloak.AuthServices.Authorization
  namespace: Keycloak.AuthServices.Authorization.AuthorizationServer
  summary: Provides access tokens for Keycloak authorization server requests.
  remarks: >-
    The default implementation uses <xref href="Microsoft.AspNetCore.Http.IHttpContextAccessor" data-throw-if-not-resolved="false"></xref> to extract the token

    from the current HTTP context. For SignalR or other long-lived connection scenarios,

    implement this interface to provide fresh tokens from an alternative source.
