  summary: >-
    <xref href="Keycloak.AuthServices.Authorization.AuthorizationServer.IKeycloakAccessTokenProvider" data-throw-if-not-resolved="false"></xref> implementation for OIDC+Cookie Web Apps.

    Retrieves the access token stored in the cookie authentication scheme when

    <code>SaveTokens = true</code> is configured on the OpenIdConnect options.
  remarks: >-
    Register this provider instead of (or before) calling <code>AddAuthorizationServer</code>

    when using <code>AddKeycloakWebAppAuthentication</code>:


    <pre><code class="lang-csharp">services.AddCookieAccessTokenProvider();

    services.AddKeycloakAuthorization().AddAuthorizationServer(...);</code></pre>


    Ensure <code>SaveTokens = true</code> is set in your OIDC options so the token

    is persisted in the cookie:


    <pre><code class="lang-csharp">.AddKeycloakWebApp(config, configureOpenIdConnectOptions: o =&gt;

    {
        o.SaveTokens = true;
        o.ResponseType = OpenIdConnectResponseType.Code;
    });</code></pre>
  example: []
  syntax:
    content: 'public class CookieAccessTokenProvider : IKeycloakAccessTokenProvider'
    content.vb: Public Class CookieAccessTokenProvider Implements IKeycloakAccessTokenProvider
