- uid: Keycloak.AuthServices.Authentication.KeycloakAuthenticationOptions.AdditionalAudiences
  commentId: P:Keycloak.AuthServices.Authentication.KeycloakAuthenticationOptions.AdditionalAudiences
  id: AdditionalAudiences
  parent: Keycloak.AuthServices.Authentication.KeycloakAuthenticationOptions
  langs:
  - csharp
  - vb
  name: AdditionalAudiences
  nameWithType: KeycloakAuthenticationOptions.AdditionalAudiences
  fullName: Keycloak.AuthServices.Authentication.KeycloakAuthenticationOptions.AdditionalAudiences
  type: Property
  assemblies:
  - Keycloak.AuthServices.Authentication
  namespace: Keycloak.AuthServices.Authentication
  summary: >-
    Gets or sets additional valid audiences accepted during JWT validation.

    Combined with the primary audience (<xref href="Keycloak.AuthServices.Authentication.KeycloakAuthenticationOptions.Audience" data-throw-if-not-resolved="false"></xref> or <xref href="Keycloak.AuthServices.Common.KeycloakInstallationOptions.Resource" data-throw-if-not-resolved="false"></xref>)

    to validate tokens issued for multiple clients within the same realm.
  example:
  - >-
    <pre><code class="lang-csharp">services.AddKeycloakWebApiAuthentication(options =&gt;

    {
        options.Resource = "api-client";
        options.AdditionalAudiences = ["billing-service", "reporting-service"];
    });</code></pre>
  syntax:
    content: public string[]? AdditionalAudiences { get; set; }
    parameters: []
    return:
      type: System.String[]
    content.vb: Public Property AdditionalAudiences As String()
  overload: Keycloak.AuthServices.Authentication.KeycloakAuthenticationOptions.AdditionalAudiences*
