  name: UmaAuthorizationMiddlewareResultHandler
  nameWithType: UmaAuthorizationMiddlewareResultHandler
  fullName: Keycloak.AuthServices.Authorization.Uma.UmaAuthorizationMiddlewareResultHandler
  type: Class
  assemblies:
  - Keycloak.AuthServices.Authorization.Uma
  namespace: Keycloak.AuthServices.Authorization.Uma
  summary: >-
    Handles authorization failures for UMA-protected resources by issuing permission tickets

    via the <code>WWW-Authenticate: UMA</code> challenge header.
  remarks: >-
    When a <xref href="Keycloak.AuthServices.Authorization.Requirements.DecisionRequirement" data-throw-if-not-resolved="false"></xref> or <xref href="Keycloak.AuthServices.Authorization.Requirements.ParameterizedProtectedResourceRequirement" data-throw-if-not-resolved="false"></xref> fails,

    this handler:


    <ol><li>Creates a permission ticket via the Keycloak Protection Permission API</li><li>Returns HTTP 401 with <code>WWW-Authenticate: UMA as_uri="...", ticket="..."</code></li></ol>


    For non-UMA authorization failures, it delegates to the default handler.
  example: []
  syntax:
