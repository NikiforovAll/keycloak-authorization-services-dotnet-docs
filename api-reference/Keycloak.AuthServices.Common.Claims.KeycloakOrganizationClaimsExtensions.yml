- uid: Keycloak.AuthServices.Common.Claims.KeycloakOrganizationClaimsExtensions.GetOrganizations(System.Collections.Generic.IEnumerable{System.Security.Claims.Claim},System.String)
  commentId: M:Keycloak.AuthServices.Common.Claims.KeycloakOrganizationClaimsExtensions.GetOrganizations(System.Collections.Generic.IEnumerable{System.Security.Claims.Claim},System.String)
  id: GetOrganizations(System.Collections.Generic.IEnumerable{System.Security.Claims.Claim},System.String)
  isExtensionMethod: true
  parent: Keycloak.AuthServices.Common.Claims.KeycloakOrganizationClaimsExtensions
  langs:
  - csharp
  - vb
  name: GetOrganizations(IEnumerable<Claim>, string?)
  nameWithType: KeycloakOrganizationClaimsExtensions.GetOrganizations(IEnumerable<Claim>, string?)
  fullName: Keycloak.AuthServices.Common.Claims.KeycloakOrganizationClaimsExtensions.GetOrganizations(System.Collections.Generic.IEnumerable<System.Security.Claims.Claim>, string?)
  type: Method
  assemblies:
  - Keycloak.AuthServices.Common
  namespace: Keycloak.AuthServices.Common.Claims
  summary: Gets the list of organizations from the claims collection.
  remarks: >-
    Supports two claim formats:


    <ul><li>

    <b>Vanilla (KC 26+)</b>: multiple string-valued <code>organization</code> claims, one per alias.

    This is the default format produced by the built-in Organization Membership mapper.

    </li><li>

    <b>Rich JSON</b>: a single JSON-valued <code>organization</code> claim containing a map of

    <code>alias → {id?, attributes?}</code>. This format can be produced by custom protocol mappers.

    </li></ul>
  example: []
  syntax:
    content: public static IReadOnlyList<OrganizationMembership> GetOrganizations(this IEnumerable<Claim> claims, string? claimType = null)
    parameters:
    - id: claims
      type: System.Collections.Generic.IEnumerable{System.Security.Claims.Claim}
      description: The claims collection.
    - id: claimType
      type: System.String
      description: Optional claim type override. Defaults to <xref href="Keycloak.AuthServices.Common.KeycloakConstants.OrganizationClaimType" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.Collections.Generic.IReadOnlyList{Keycloak.AuthServices.Common.Claims.OrganizationMembership}
      description: A list of organization memberships. Empty if no organization claim is present.
    content.vb: Public Shared Function GetOrganizations(claims As IEnumerable(Of Claim), claimType As String = Nothing) As IReadOnlyList(Of OrganizationMembership)
  overload: Keycloak.AuthServices.Common.Claims.KeycloakOrganizationClaimsExtensions.GetOrganizations*
  nameWithType.vb: KeycloakOrganizationClaimsExtensions.GetOrganizations(IEnumerable(Of Claim), String)
  fullName.vb: Keycloak.AuthServices.Common.Claims.KeycloakOrganizationClaimsExtensions.GetOrganizations(System.Collections.Generic.IEnumerable(Of System.Security.Claims.Claim), String)
  name.vb: GetOrganizations(IEnumerable(Of Claim), String)
