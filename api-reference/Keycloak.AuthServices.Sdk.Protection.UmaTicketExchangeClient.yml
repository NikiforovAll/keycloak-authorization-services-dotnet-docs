- uid: Keycloak.AuthServices.Sdk.Protection.UmaTicketExchangeClient.SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  commentId: M:Keycloak.AuthServices.Sdk.Protection.UmaTicketExchangeClient.SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  id: SubmitPermissionRequestAsync(System.String,System.String,System.Threading.CancellationToken)
  parent: Keycloak.AuthServices.Sdk.Protection.UmaTicketExchangeClient
  langs:
  - csharp
  - vb
  name: SubmitPermissionRequestAsync(string, string, CancellationToken)
  nameWithType: UmaTicketExchangeClient.SubmitPermissionRequestAsync(string, string, CancellationToken)
  fullName: Keycloak.AuthServices.Sdk.Protection.UmaTicketExchangeClient.SubmitPermissionRequestAsync(string, string, System.Threading.CancellationToken)
  type: Method
  assemblies:
  - Keycloak.AuthServices.Sdk
  namespace: Keycloak.AuthServices.Sdk.Protection
  summary: Submits a permission request for resource owner approval.
  remarks: >-
    Uses the <code>submit_request=true</code> parameter in the UMA ticket exchange.

    When access is denied, Keycloak persists a pending permission request that

    the resource owner can approve.
  example: []
  syntax:
    content: public Task<bool> SubmitPermissionRequestAsync(string accessToken, string ticket, CancellationToken cancellationToken = default)
    parameters:
    - id: accessToken
      type: System.String
      description: The bearer access token of the requesting party.
    - id: ticket
      type: System.String
      description: The permission ticket received from the resource server's UMA challenge.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
      description: <code>true</code> if the permission request was submitted for owner approval; otherwise <code>false</code>.
    content.vb: Public Function SubmitPermissionRequestAsync(accessToken As String, ticket As String, cancellationToken As CancellationToken = Nothing) As Task(Of Boolean)
  overload: Keycloak.AuthServices.Sdk.Protection.UmaTicketExchangeClient.SubmitPermissionRequestAsync*
