  type: Class
  assemblies:
  - Keycloak.AuthServices.Sdk
  namespace: Keycloak.AuthServices.Sdk.Admin.Requests.Users
  summary: >-
    Optional request parameters for the IKeycloakClient.GetUserCountAsync endpoint.

    It can be called in three different ways.


    <ol><li>
                Don’t specify any criteria. The number of all users within that realm will be returned, not limited by
                pagination.
            </li><li>
                If <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.Search" data-throw-if-not-resolved="false"></xref> is specified, other criteria such as <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.LastName" data-throw-if-not-resolved="false"></xref> will be ignored
                even though you set them. The <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.Search" data-throw-if-not-resolved="false"></xref> string will be matched against the first and last
                name, the username and the email of a user.
            </li><li>
                If <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.Search" data-throw-if-not-resolved="false"></xref> is unspecified but any of <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.LastName" data-throw-if-not-resolved="false"></xref>, <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.FirstName" data-throw-if-not-resolved="false"></xref>,
                <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.Email" data-throw-if-not-resolved="false"></xref> or <xref href="Keycloak.AuthServices.Sdk.Admin.Requests.Users.GetUserCountRequestParameters.Username" data-throw-if-not-resolved="false"></xref>, those criteria are matched against their respective
                fields on a user entity. Combined with a logical and.
            </li></ol>
