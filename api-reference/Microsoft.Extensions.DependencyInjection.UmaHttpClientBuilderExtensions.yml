- uid: Microsoft.Extensions.DependencyInjection.UmaHttpClientBuilderExtensions.AddUmaTokenHandler(Microsoft.Extensions.DependencyInjection.IHttpClientBuilder)
  commentId: M:Microsoft.Extensions.DependencyInjection.UmaHttpClientBuilderExtensions.AddUmaTokenHandler(Microsoft.Extensions.DependencyInjection.IHttpClientBuilder)
  id: AddUmaTokenHandler(Microsoft.Extensions.DependencyInjection.IHttpClientBuilder)
  isExtensionMethod: true
  parent: Microsoft.Extensions.DependencyInjection.UmaHttpClientBuilderExtensions
  langs:
  - csharp
  - vb
  name: AddUmaTokenHandler(IHttpClientBuilder)
  nameWithType: UmaHttpClientBuilderExtensions.AddUmaTokenHandler(IHttpClientBuilder)
  fullName: Microsoft.Extensions.DependencyInjection.UmaHttpClientBuilderExtensions.AddUmaTokenHandler(Microsoft.Extensions.DependencyInjection.IHttpClientBuilder)
  type: Method
  assemblies:
  - Keycloak.AuthServices.Authorization.Uma
  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Adds the <xref href="Keycloak.AuthServices.Authorization.Uma.UmaTokenHandler" data-throw-if-not-resolved="false"></xref> to the HTTP client pipeline.

    When the downstream service returns a 401 with a <code>WWW-Authenticate: UMA</code> challenge,

    the handler automatically exchanges the permission ticket for an RPT and retries the request.
  remarks: >-
    Requires <code>AddKeycloakUmaTicketExchangeHttpClient</code> to be called first to register

    the <xref href="Keycloak.AuthServices.Sdk.Protection.IUmaTicketExchangeClient" data-throw-if-not-resolved="false"></xref>.

    Also requires <code>AddHttpContextAccessor</code> to be called.
  example: []
  syntax:
    content: public static IHttpClientBuilder AddUmaTokenHandler(this IHttpClientBuilder builder)
    parameters:
    - id: builder
      type: Microsoft.Extensions.DependencyInjection.IHttpClientBuilder
      description: The HTTP client builder.
    return:
      type: Microsoft.Extensions.DependencyInjection.IHttpClientBuilder
      description: The <xref href="Microsoft.Extensions.DependencyInjection.IHttpClientBuilder" data-throw-if-not-resolved="false"></xref> for further configuration.
    content.vb: Public Shared Function AddUmaTokenHandler(builder As IHttpClientBuilder) As IHttpClientBuilder
  overload: Microsoft.Extensions.DependencyInjection.UmaHttpClientBuilderExtensions.AddUmaTokenHandler*
